services:
  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lms:lms@postgres:5432/lms
      CACHE_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on: {postgres: {condition: service_healthy}, redis: {condition: service_healthy}}
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: lms, POSTGRES_USER: lms, POSTGRES_PASSWORD: lms}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U lms"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7-alpine
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10}
  celery_worker:
    build: .
    command: celery -A config worker -l INFO
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lms:lms@postgres:5432/lms
      CACHE_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [redis, postgres]
  celery_beat:
    build: .
    command: celery -A config beat -l INFO
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lms:lms@postgres:5432/lms
      CACHE_URL: redis://redis:6379/1
      CHANNEL_REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on: [redis]
  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes: ["./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [web]
volumes: {postgres_data: {}}
