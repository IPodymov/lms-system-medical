{% extends 'base.html' %}
{% block content %}
<article class="card course-detail">
  {% if course.cover %}<img class="course-cover" src="{{ course.cover.url }}" alt="Обложка курса {{ course.title }}">{% endif %}
  <h1>{{ course.title }}</h1><p>{{ course.short_description }}</p><div>{{ course.description|linebreaks }}</div>
  {% if can_edit %}<p><a class="button-link" href="{% url 'course-edit' course.id %}">Редактировать курс</a></p>{% endif %}
</article>
{% endblock %}
