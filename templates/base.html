{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}МедЛМС{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/"><span class="brand-mark">M</span><span>МедЛМС</span></a>{% if user.is_authenticated %}
      <nav class="main-nav" aria-label="Основная навигация">
        <a href="/courses/mine/">Мои курсы</a>
        <a href="/courses/catalog/">Каталог</a>
        <a class="nav-create" href="/courses/create/">Создать курс</a>
        <a href="/notifications/">Уведомления</a>
        <a class="profile-link" href="/profile/">{{ user.email }}</a><a class="logout-link" href="/logout/">Выйти</a>
      </nav>
      {% endif %}
    </header>
    <main class="app-main">
      {% for message in messages %}
      <p class="alert" role="status">{{ message }}</p>
      {% endfor %}{% block content %}{% endblock %}
    </main>
  </body>
</html>
