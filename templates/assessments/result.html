{% extends 'base.html' %}
{% block content %}<section class="card result"><h1>{% if attempt.passed %}Тест пройден{% else %}Тест не пройден{% endif %}</h1><p>Результат: {{ attempt.score }} из {{ attempt.max_score }}.</p><a class="button-link" href="{% url 'course-learning' enrollment.id %}?block={{ attempt.quiz.content_block.id }}">Продолжить курс</a></section>{% endblock %}
